<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log In | STOODY Language Learning</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body {
    font-family: 'Lexend', sans-serif;
    background-color: #fff3f8;
    color: #45223f;
}

.glass-card {
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(12px);
}

.primary-gradient {
    background: linear-gradient(45deg, #9522ac 0%, #e571f8 100%);
}

.ambient-glow {
    box-shadow: 0 20px 40px -10px rgba(69, 34, 63, 0.06);
}

.ghost-border {
    border: 1px solid rgba(206, 159, 194, 0.15);
}
</style>

</head>

<body class="min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="w-full px-8 py-4 flex justify-between items-center fixed top-0 z-50 glass-card">

    <div class="flex items-center gap-2">
        <img src="assets/logo.png" alt="STOODY Logo" class="h-[120px] object-contain hover:scale-105 transition">
    </div>

    <div class="flex items-center gap-8">
        <div class="hidden md:flex gap-6">
            <a class="font-medium hover:text-purple-600" href="#">Help</a>
            <a class="font-medium hover:text-purple-600" href="#">About</a>
        </div>

        <button class="primary-gradient text-white px-6 py-2.5 rounded-full font-semibold text-sm">
            Sign Up
        </button>
    </div>

</nav>

<!-- MAIN -->
<main class="flex-grow flex items-center justify-center px-4 pt-40">

<div class="w-full max-w-md">

<div class="bg-white p-10 rounded-xl ambient-glow ghost-border">

<div class="mb-10 text-center">
    <h1 class="text-2xl font-bold mb-2">Welcome back!</h1>
    <p class="text-gray-500">Continue your linguistic journey</p>
</div>

<form class="space-y-6">

<div>
    <label>Email Address</label>
    <input class="w-full p-4 border rounded-lg mt-2" placeholder="name@example.com" type="email"/>
</div>

<!-- PASSWORD COM FUNÇÃO -->
<div class="relative">
    <label>Password</label>
    
    <input 
        id="password"
        class="w-full p-4 border rounded-lg mt-2 pr-12"
        placeholder="••••••••"
        type="password"
    />

    <!-- BOTÃO OLHO -->
    <button 
        type="button"
        id="togglePassword"
        class="absolute right-4 top-[55%] text-gray-500 hover:text-purple-600"
    >
        <span id="eyeIcon" class="material-symbols-outlined">
            visibility
        </span>
    </button>

    <div class="text-right mt-1">
        <a class="text-purple-600 text-sm" href="#">Forgot password?</a>
    </div>
</div>

<button class="w-full primary-gradient text-white py-4 rounded-full font-bold">
    Log In
</button>

</form>

<div class="mt-10 text-center">
    <p class="text-gray-500">
        Don't have an account?
        <a class="text-purple-600 font-bold" href="#">Create one</a>
    </p>
</div>

</div>

</div>

</main>

<!-- FOOTER -->
<footer class="w-full py-8 px-8 border-t">
<div class="flex justify-between items-center">

<p class="text-sm text-gray-500">© 2024 STOODY</p>

<div class="flex gap-8">
    <a href="#">Terms</a>
    <a href="#">Privacy</a>
    <a href="#">Contact</a>
</div>

</div>
</footer>

<!-- SCRIPT FUNCIONAL -->
<script>
const passwordInput = document.getElementById("password");
const toggleButton = document.getElementById("togglePassword");
const eyeIcon = document.getElementById("eyeIcon");

toggleButton.addEventListener("click", () => {
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.textContent = "visibility_off";
    } else {
        passwordInput.type = "password";
        eyeIcon.textContent = "visibility";
    }
});
</script>

</body>
</html>
